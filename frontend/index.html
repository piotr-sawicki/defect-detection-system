<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Defect Detection</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: sans-serif;
      background: #f5f5f5;
      color: #222;
      padding: 2rem;
    }

    h1 { margin-bottom: 2rem; font-size: 1.8rem; }
    h2 { font-size: 1.1rem; margin-bottom: 1rem; color: #555; }

    .section {
      background: white;
      border-radius: 8px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }

    /* Upload */
    .upload-area {
      border: 2px dashed #ccc;
      border-radius: 6px;
      padding: 2rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .upload-area:hover { border-color: #888; }
    .upload-area input { display: none; }
    .upload-area p { color: #888; margin-top: 0.5rem; font-size: 0.9rem; }

    /* Examples grid */
    .examples-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 0.75rem;
    }

    .example-card {
      border: 2px solid transparent;
      border-radius: 6px;
      overflow: hidden;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .example-card:hover { border-color: #888; }
    .example-card.selected { border-color: #2563eb; }

    .example-card img {
      width: 100%;
      display: block;
    }

    .example-card span {
      display: block;
      font-size: 0.65rem;
      padding: 4px;
      text-align: center;
      background: #f9f9f9;
      word-break: break-all;
    }

    /* Button */
    button {
      background: #2563eb;
      color: white;
      border: none;
      padding: 0.6rem 1.5rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 1rem;
      margin-top: 1rem;
    }
    button:disabled { background: #aaa; cursor: default; }
    button:hover:not(:disabled) { background: #1d4ed8; }

    /* Result area */
    #result-section { display: none; }

    #result-summary {
      padding: 0.9rem 1.2rem;
      border-radius: 6px;
      font-size: 1rem;
      margin-bottom: 1rem;
    }
    #result-summary.defect { background: #fee2e2; color: #991b1b; }
    #result-summary.ok     { background: #dcfce7; color: #166534; }
    #result-summary.error  { background: #fef9c3; color: #854d0e; }

    #result-canvas {
      display: block;
      max-width: 100%;
      border-radius: 6px;
      border: 1px solid #e5e7eb;
    }

    /* Preview */
    #preview {
      max-width: 300px;
      margin-top: 1rem;
      border-radius: 6px;
      display: none;
    }
  </style>
</head>
<body>

  <h1>Defect Detection</h1>

  <div class="section">
    <h2>Upload image</h2>
    <div class="upload-area" onclick="document.getElementById('file-input').click()">
      <input type="file" id="file-input" accept="image/*" onchange="onFileSelect(event)">
      <div>Click to select an image from your computer</div>
      <p>JPG, PNG supported</p>
    </div>
    <img id="preview">
  </div>

  <div class="section">
    <h2>Or choose from examples</h2>
    <div class="examples-grid" id="examples-grid"></div>
  </div>

  <div class="section">
    <button id="predict-btn" disabled onclick="runPredict()">Run prediction</button>
  </div>

  <div class="section" id="result-section">
    <h2>Result</h2>
    <div id="result-summary"></div>
    <canvas id="result-canvas"></canvas>
  </div>

  <script>
    const LABEL_COLORS = {
      crazing:         "#ef4444",
      inclusion:       "#f97316",
      patches:         "#eab308",
      pitted_surface:  "#22c55e",
      "rolled-in_scale": "#3b82f6",
      scratches:       "#a855f7",
    };
    const DEFAULT_COLOR = "#ec4899";

    let selectedFile = null;
    let selectedExample = null;

    // Load examples
    fetch("/examples")
      .then(r => r.json())
      .then(data => {
        const grid = document.getElementById("examples-grid");
        data.examples.forEach(filename => {
          const card = document.createElement("div");
          card.className = "example-card";
          card.innerHTML = `
            <img src="/examples-images/${filename}" alt="${filename}">
            <span>${filename}</span>
          `;
          card.onclick = () => selectExample(filename, card);
          grid.appendChild(card);
        });
      });

    function selectExample(filename, card) {
      document.querySelectorAll(".example-card").forEach(c => c.classList.remove("selected"));
      card.classList.add("selected");
      selectedExample = filename;
      selectedFile = null;
      document.getElementById("preview").style.display = "none";
      document.getElementById("predict-btn").disabled = false;
      hideResult();
    }

    function onFileSelect(event) {
      const file = event.target.files[0];
      if (!file) return;
      selectedFile = file;
      selectedExample = null;
      document.querySelectorAll(".example-card").forEach(c => c.classList.remove("selected"));

      const preview = document.getElementById("preview");
      preview.src = URL.createObjectURL(file);
      preview.style.display = "block";
      document.getElementById("predict-btn").disabled = false;
      hideResult();
    }

    async function runPredict() {
      hideResult();
      document.getElementById("predict-btn").disabled = true;

      let response;
      try {
        if (selectedExample) {
          response = await fetch(`/predict/example/${selectedExample}`, { method: "POST" });
        } else if (selectedFile) {
          const formData = new FormData();
          formData.append("file", selectedFile);
          response = await fetch("/predict/upload", { method: "POST", body: formData });
        }
      } catch (e) {
        showError("Network error: " + e.message);
        document.getElementById("predict-btn").disabled = false;
        return;
      }

      document.getElementById("predict-btn").disabled = false;

      if (!response.ok) {
        showError("Error: " + response.statusText);
        return;
      }

      const data = await response.json();

      // Load the image to draw on canvas
      let imgSrc;
      if (selectedExample) {
        imgSrc = `/examples-images/${selectedExample}`;
      } else {
        imgSrc = URL.createObjectURL(selectedFile);
      }

      const img = new Image();
      img.onload = () => drawResult(img, data);
      img.src = imgSrc;
    }

    function drawResult(img, data) {
      const canvas = document.getElementById("result-canvas");
      canvas.width  = img.naturalWidth;
      canvas.height = img.naturalHeight;
      const ctx = canvas.getContext("2d");

      ctx.drawImage(img, 0, 0);

      for (const box of data.boxes) {
        const color = LABEL_COLORS[box.label] || DEFAULT_COLOR;
        const x = box.x1, y = box.y1, w = box.x2 - box.x1, h = box.y2 - box.y1;

        ctx.strokeStyle = color;
        ctx.lineWidth = 2;
        ctx.strokeRect(x, y, w, h);

        const text = `${box.label} ${(box.score * 100).toFixed(1)}%`;
        ctx.font = "bold 11px sans-serif";
        const textW = ctx.measureText(text).width;

        ctx.fillStyle = color;
        ctx.fillRect(x, y - 16, textW + 8, 16);
        ctx.fillStyle = "#fff";
        ctx.fillText(text, x + 4, y - 4);
      }

      // Summary
      const summary = document.getElementById("result-summary");
      if (data.count === 0) {
        summary.textContent = "No defects detected.";
        summary.className = "ok";
      } else {
        summary.textContent =
          `Found ${data.count} defect${data.count > 1 ? "s" : ""} — avg. score: ${(data.avg_score * 100).toFixed(1)}%`;
        summary.className = "defect";
      }

      document.getElementById("result-section").style.display = "block";
    }

    function showError(msg) {
      const summary = document.getElementById("result-summary");
      summary.textContent = msg;
      summary.className = "error";
      document.getElementById("result-canvas").width = 0;
      document.getElementById("result-section").style.display = "block";
    }

    function hideResult() {
      document.getElementById("result-section").style.display = "none";
    }
  </script>

</body>
</html>
