<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Defect Detection</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: sans-serif;
      background: #f5f5f5;
      color: #222;
      padding: 2rem;
    }

    h1 { margin-bottom: 2rem; font-size: 1.8rem; }
    h2 { font-size: 1.1rem; margin-bottom: 1rem; color: #555; }

    .section {
      background: white;
      border-radius: 8px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }

    /* Upload */
    .upload-area {
      border: 2px dashed #ccc;
      border-radius: 6px;
      padding: 2rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .upload-area:hover { border-color: #888; }
    .upload-area input { display: none; }
    .upload-area p { color: #888; margin-top: 0.5rem; font-size: 0.9rem; }

    /* Examples grid */
    .examples-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 0.75rem;
    }

    .example-card {
      border: 2px solid transparent;
      border-radius: 6px;
      overflow: hidden;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .example-card:hover { border-color: #888; }
    .example-card.selected { border-color: #2563eb; }

    .example-card img {
      width: 100%;
      display: block;
    }

    .example-card span {
      display: block;
      font-size: 0.65rem;
      padding: 4px;
      text-align: center;
      background: #f9f9f9;
      word-break: break-all;
    }

    /* Button */
    button {
      background: #2563eb;
      color: white;
      border: none;
      padding: 0.6rem 1.5rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 1rem;
      margin-top: 1rem;
    }
    button:disabled { background: #aaa; cursor: default; }
    button:hover:not(:disabled) { background: #1d4ed8; }

    /* Result */
    #result {
      display: none;
      margin-top: 1rem;
      padding: 1rem;
      border-radius: 6px;
      font-size: 1rem;
    }
    #result.defect { background: #fee2e2; color: #991b1b; }
    #result.ok { background: #dcfce7; color: #166534; }

    /* Preview */
    #preview {
      max-width: 300px;
      margin-top: 1rem;
      border-radius: 6px;
      display: none;
    }
  </style>
</head>
<body>

  <h1>Defect Detection</h1>

  <div class="section">
    <h2>Upload image</h2>
    <div class="upload-area" onclick="document.getElementById('file-input').click()">
      <input type="file" id="file-input" accept="image/*" onchange="onFileSelect(event)">
      <div>Click to select an image from your computer</div>
      <p>JPG, PNG supported</p>
    </div>
    <img id="preview">
  </div>

  <div class="section">
    <h2>Or choose from examples</h2>
    <div class="examples-grid" id="examples-grid"></div>
  </div>

  <div class="section">
    <button id="predict-btn" disabled onclick="runPredict()">Run prediction</button>
    <div id="result"></div>
  </div>

  <script>
    let selectedFile = null;
    let selectedExample = null;

    // Load examples
    fetch("/examples")
      .then(r => r.json())
      .then(data => {
        const grid = document.getElementById("examples-grid");
        data.examples.forEach(filename => {
          const card = document.createElement("div");
          card.className = "example-card";
          card.innerHTML = `
            <img src="/examples-images/${filename}" alt="${filename}">
            <span>${filename}</span>
          `;
          card.onclick = () => selectExample(filename, card);
          grid.appendChild(card);
        });
      });

    function selectExample(filename, card) {
      document.querySelectorAll(".example-card").forEach(c => c.classList.remove("selected"));
      card.classList.add("selected");
      selectedExample = filename;
      selectedFile = null;
      document.getElementById("preview").style.display = "none";
      document.getElementById("predict-btn").disabled = false;
      clearResult();
    }

    function onFileSelect(event) {
      const file = event.target.files[0];
      if (!file) return;
      selectedFile = file;
      selectedExample = null;
      document.querySelectorAll(".example-card").forEach(c => c.classList.remove("selected"));

      const preview = document.getElementById("preview");
      preview.src = URL.createObjectURL(file);
      preview.style.display = "block";
      document.getElementById("predict-btn").disabled = false;
      clearResult();
    }

    async function runPredict() {
      clearResult();
      document.getElementById("predict-btn").disabled = true;

      let response;
      if (selectedExample) {
        response = await fetch(`/predict/example/${selectedExample}`, { method: "POST" });
      } else if (selectedFile) {
        const formData = new FormData();
        formData.append("file", selectedFile);
        response = await fetch("/predict/upload", { method: "POST", body: formData });
      }

      document.getElementById("predict-btn").disabled = false;

      if (!response.ok) {
        showResult("Error: " + response.statusText, "defect");
        return;
      }

      const data = await response.json();
      const label = data.defect_detected ? "Defect detected" : "No defect detected";
      const confidence = (data.confidence * 100).toFixed(1);
      showResult(`${label} — confidence: ${confidence}%`, data.defect_detected ? "defect" : "ok");
    }

    function showResult(text, type) {
      const el = document.getElementById("result");
      el.textContent = text;
      el.className = type;
      el.style.display = "block";
    }

    function clearResult() {
      const el = document.getElementById("result");
      el.style.display = "none";
    }
  </script>

</body>
</html>
